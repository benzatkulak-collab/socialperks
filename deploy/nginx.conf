# Social Perks — Production Nginx Config
# Routes /api/v1/* to Hono API service, everything else to Next.js

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 64;
}

upstream api {
    server 127.0.0.1:4000;
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_strict:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=api_standard:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=api_public:10m rate=120r/m;

server {
    listen 80;
    server_name socialperks.app www.socialperks.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name socialperks.app www.socialperks.app;

    # SSL (replace with your cert paths)
    ssl_certificate     /etc/ssl/certs/socialperks.crt;
    ssl_certificate_key /etc/ssl/private/socialperks.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Gzip
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 256;

    # ── API routes → Hono service ────────────────────────────────
    location /api/v1/ {
        proxy_pass http://api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE support (for /api/v1/events)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;

        # Webhook support (preserve raw body for signature verification)
        proxy_set_header Content-Length $content_length;
    }

    # ── Everything else → Next.js ────────────────────────────────
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Static assets from Next.js ───────────────────────────────
    location /_next/static/ {
        proxy_pass http://nextjs;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health checks ────────────────────────────────────────────
    location = /health {
        proxy_pass http://api/v1/health;
        access_log off;
    }
}
