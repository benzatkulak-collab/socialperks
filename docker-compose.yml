services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: socialperks-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://socialperks:socialperks@postgres:5432/socialperks
      - REDIS_URL=redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - socialperks

  postgres:
    image: postgres:16-alpine
    container_name: socialperks-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: socialperks
      POSTGRES_PASSWORD: socialperks
      POSTGRES_DB: socialperks
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - socialperks
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U socialperks -d socialperks"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: socialperks-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - socialperks
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

volumes:
  pgdata:
  redisdata:

networks:
  socialperks:
    driver: bridge
