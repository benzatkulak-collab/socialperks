name: CI

# Required-status pipeline. Configure branch protection on `main` to require
# the `build-and-test` check before merging.

on:
  push:
    branches: [main, "claude/*"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Stable values so `npm run build` doesn't error on missing secrets.
      AUTH_SECRET: ci-test-secret-not-real
      CSRF_SECRET: ci-test-csrf-not-real
      NEXT_TELEMETRY_DISABLED: "1"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx', '**/*.js', '**/*.jsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('package-lock.json') }}-

      - name: Install deps
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npx tsc --noEmit

      - name: Unit + integration tests
        run: npm run test

      - name: Build
        run: npm run build
