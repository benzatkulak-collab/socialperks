name: CI
on:
  push:
    branches: [main, claude/*]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run test
      - run: npm run build
        env:
          AUTH_SECRET: ci-test-secret-not-real
          CSRF_SECRET: ci-test-csrf-not-real
