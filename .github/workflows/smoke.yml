name: Smoke tests

# Hits the production deployment every hour with a small set of critical
# checks (homepage, /auth, /upgrade, /api/v1/health, signup, billing
# auth-gate, cron auth-gate). Surfaces an outage before users do.
#
# Override the target URL by setting SMOKE_BASE_URL as a repo secret.

on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:
    inputs:
      base_url:
        description: "URL to hit (defaults to SMOKE_BASE_URL secret or https://socialperks.onrender.com)"
        required: false
        default: ""

env:
  BASE_URL: ${{ inputs.base_url != '' && inputs.base_url || (secrets.SMOKE_BASE_URL || 'https://socialperks.onrender.com') }}

jobs:
  smoke:
    name: Production smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke checks
        env:
          BASE_URL: ${{ env.BASE_URL }}
        run: |
          chmod +x ./scripts/smoke-test.sh
          ./scripts/smoke-test.sh
